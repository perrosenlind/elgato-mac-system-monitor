<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Memory</title>
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
  </head>
  <body>
    <sdpi-item label="Refresh interval">
      <sdpi-textfield setting="refreshMs" default="2000" placeholder="2000" pattern="[0-9]*"></sdpi-textfield>
      <span style="color:var(--sdpi-color-secondary,#888);font-size:11px;margin-left:4px">ms (500–10000)</span>
    </sdpi-item>
    <sdpi-item label="Warning threshold">
      <sdpi-textfield setting="warnThreshold" default="70" placeholder="70" pattern="[0-9]*"></sdpi-textfield>
      <span style="color:var(--sdpi-color-secondary,#888);font-size:11px;margin-left:4px">% (turns yellow)</span>
    </sdpi-item>
    <sdpi-item label="Critical threshold">
      <sdpi-textfield setting="critThreshold" default="90" placeholder="90" pattern="[0-9]*"></sdpi-textfield>
      <span style="color:var(--sdpi-color-secondary,#888);font-size:11px;margin-left:4px">% (turns red)</span>
    </sdpi-item>
  </body>
</html>
